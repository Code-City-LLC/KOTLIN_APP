name: Connected session gate

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/connected-session-gate.yml"
      - "app/src/main/java/com/ga/airdrop/core/auth/**"
      - "app/src/main/java/com/ga/airdrop/core/prefs/**"
      - "app/src/main/java/com/ga/airdrop/core/push/**"
      - "app/src/main/java/com/ga/airdrop/core/session/**"
      - "app/src/main/java/com/ga/airdrop/feature/home/**"
      - "app/src/main/java/com/ga/airdrop/feature/homedetails/GoldPriorityViewModel.kt"
      - "app/src/main/java/com/ga/airdrop/feature/homedetails/NotificationsScreen.kt"
      - "app/src/main/java/com/ga/airdrop/feature/homedetails/WarehousesViewModel.kt"
      - "app/src/main/java/com/ga/airdrop/feature/more/MoreRepository.kt"
      - "app/src/main/java/com/ga/airdrop/feature/more/MoreViewModel.kt"
      - "app/src/main/java/com/ga/airdrop/feature/more/NotificationSettings*"
      - "app/src/main/java/com/ga/airdrop/feature/more/PreferencesViewModel.kt"
      - "app/src/main/java/com/ga/airdrop/feature/more/ProfileViewModel.kt"
      - "app/src/androidTest/java/com/ga/airdrop/core/push/**"
      - "app/src/androidTest/java/com/ga/airdrop/core/session/**"
      - "app/src/androidTest/java/com/ga/airdrop/feature/homedetails/NotificationsScreenParityTest.kt"
      - "app/src/androidTest/java/com/ga/airdrop/feature/more/**"
  workflow_dispatch:

concurrency:
  group: connected-session-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  focused-connected:
    name: Prod and Staging session runtime
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Record exact checkout provenance
        run: |
          set -euo pipefail
          printf 'event=%s\n' "${GITHUB_EVENT_NAME}"
          printf 'ref=%s\n' "${GITHUB_REF}"
          printf 'sha=%s\n' "${GITHUB_SHA}"
          printf 'head=%s\n' "$(git rev-parse HEAD)"
          printf 'tree=%s\n' "$(git rev-parse HEAD^{tree})"

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run focused Prod and Staging connected tests
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: |
            set -eu
            classes="com.ga.airdrop.core.session.AuthenticatedResponseSessionBindingTest,com.ga.airdrop.core.push.PushRegistrarSessionBindingTest,com.ga.airdrop.feature.more.NotificationSettingsParityTest,com.ga.airdrop.feature.homedetails.NotificationsScreenParityTest"
            proof_root="${RUNNER_TEMP}/connected-session-proof"
            results_root="app/build/outputs/androidTest-results/connected"
            reports_root="app/build/reports/androidTests/connected"
            rm -rf "$proof_root"
            mkdir -p "$proof_root"

            assert_results() {
              local label="$1"
              local xml_root="$2"
              local expected="$3"
              LABEL="$label" XML_ROOT="$xml_root" EXPECTED="$expected" ruby <<'RUBY'
            require "rexml/document"

            label = ENV.fetch("LABEL")
            root = ENV.fetch("XML_ROOT")
            expected = Integer(ENV.fetch("EXPECTED"), 10)
            files = Dir[File.join(root, "**", "TEST-*.xml")]
            abort "#{label}: no connected-test XML files under #{root}" if files.empty?

            totals = Hash.new(0)
            files.each do |path|
              suite = REXML::Document.new(File.read(path)).root
              %w[tests failures errors skipped].each do |key|
                totals[key] += suite.attributes[key].to_i
              end
              puts "#{label}: #{path} tests=#{suite.attributes['tests']} failures=#{suite.attributes['failures']} errors=#{suite.attributes['errors']} skipped=#{suite.attributes['skipped']}"
            end

            puts "#{label}: total tests=#{totals['tests']} failures=#{totals['failures']} errors=#{totals['errors']} skipped=#{totals['skipped']}"
            required = {
              "tests" => expected,
              "failures" => 0,
              "errors" => 0,
              "skipped" => 0,
            }
            abort "#{label}: expected #{required.inspect}, got #{totals.inspect}" unless totals == required
            RUBY
            }

            preserve_flavor() {
              local flavor="$1"
              local destination="$proof_root/$flavor"
              test -d "$results_root"
              test -d "$reports_root"
              mkdir -p "$destination"
              cp -R "$results_root" "$destination/results"
              cp -R "$reports_root" "$destination/reports"
              assert_results "$flavor" "$destination/results" 36
            }

            ./gradlew --no-daemon --stacktrace :app:connectedProdDebugAndroidTest \
              "-Pandroid.testInstrumentationRunnerArguments.class=$classes"
            preserve_flavor prod

            rm -rf "$results_root" "$reports_root"
            ./gradlew --no-daemon --stacktrace :app:connectedStagingDebugAndroidTest \
              "-Pandroid.testInstrumentationRunnerArguments.class=$classes"
            preserve_flavor staging

            assert_results aggregate "$proof_root" 72
            rm -rf "$results_root" "$reports_root"

      - name: Upload connected test reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4b # v5
        with:
          name: connected-session-reports-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/connected-session-proof/
            app/build/outputs/androidTest-results/connected/
            app/build/reports/androidTests/connected/
          if-no-files-found: ignore
          retention-days: 7
