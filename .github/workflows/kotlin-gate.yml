name: Kotlin gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: kotlin-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Unit tests and dual-flavor compile
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Kotlin application and test sources
        run: >-
          ./gradlew --no-daemon --stacktrace
          testProdDebugUnitTest
          compileProdDebugKotlin
          compileStagingDebugKotlin
          compileProdDebugAndroidTestKotlin
          compileStagingDebugAndroidTestKotlin
