name: Kotlin gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: kotlin-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Unit tests and dual-flavor compile
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Check source hygiene
        run: git diff --check HEAD^ HEAD

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      - name: Verify APK publication shell contract
        run: |
          bash -n scripts/build-apk.sh
          bash -n scripts/test-build-apk.sh
          scripts/test-build-apk.sh

      - name: Verify Kotlin application and test sources
        run: >-
          ./gradlew --no-daemon --stacktrace
          testProdDebugUnitTest
          testStagingDebugUnitTest
          compileProdDebugKotlin
          compileStagingDebugKotlin
          compileProdDebugAndroidTestKotlin
          compileStagingDebugAndroidTestKotlin

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: kotlin-test-reports-${{ github.run_id }}
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 7
